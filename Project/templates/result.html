<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Result</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
            --info: #3b82f6;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        /* Dynamic background depending on result class using a trick with CSS custom properties or just default */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.1), transparent 30%),
                radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.1), transparent 30%);
            z-index: -2;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 3rem;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: zoomIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1;
        }

        @keyframes zoomIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .result-circle {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem auto;
            font-size: 3rem;
            font-weight: 700;
            color: white;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.2), 0 10px 20px rgba(0,0,0,0.3);
            border: 4px solid rgba(255, 255, 255, 0.2);
            position: relative;
        }

        .result-circle.success { background: linear-gradient(135deg, #34d399, #059669); }
        .result-circle.info { background: linear-gradient(135deg, #60a5fa, #2563eb); }
        .result-circle.warning { background: linear-gradient(135deg, #fbbf24, #d97706); }
        .result-circle.danger { background: linear-gradient(135deg, #f87171, #dc2626); }

        .title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--text-muted);
        }

        .message {
            font-size: 1.15rem;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .message i {
            margin-right: 8px;
        }

        .msg-success { color: var(--success); }
        .msg-info { color: var(--info); }
        .msg-warning { color: var(--warning); }
        .msg-danger { color: var(--danger); }

        .back-btn {
            display: inline-block;
            padding: 1rem 2rem;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .error-state {
            color: var(--danger);
            font-size: 1.2rem;
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>

    <div class="container">
        {% if final %}
            <div class="title">Predicted Final Score</div>
            
            <div class="result-circle {{ msg_class }}">
                {{ prediction_text.split('%')[0] }}<span style="font-size: 1.5rem;">%</span>
            </div>
            
            <p class="message msg-{{ msg_class }}">
                <i class="fa-solid {{ icon }}"></i> {{ message }}
            </p>
        {% else %}
            <div class="title">Oops!</div>
            <p class="error-state"><i class="fa-solid fa-triangle-exclamation"></i> {{ prediction_text }}</p>
        {% endif %}
        
        <a href="/" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Run Another Prediction</a>
    </div>

</body>
</html>
